<!DOCTYPE html>
<html>
<head>
  <title>DuoAlarm Web 🚨</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-messaging-compat.js"></script>

  <!-- 🔥 SEXY CSS -->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: radial-gradient(circle at top, #1f1c2c, #0f2027);
      color: #eaeaea;
      text-align: center;
      padding: 30px;
    }

    #wake, #login, #app {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(18px);
      border-radius: 20px;
      padding: 25px;
      margin: 20px auto;
      max-width: 420px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
      border: 1px solid rgba(255,255,255,0.08);
      transition: 0.3s ease;
    }

    #wake:hover, #login:hover, #app:hover {
      transform: translateY(-3px);
    }

    h2 {
      font-size: 32px;
      margin-bottom: 20px;
      font-weight: 700;
      background: linear-gradient(90deg, #ff7eb3, #7afcff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    h3 { margin: 20px 0 10px; color: #cfcfcf; }

    input {
      padding: 12px;
      width: 80%;
      border-radius: 12px;
      border: none;
      background: rgba(255,255,255,0.08);
      color: white;
    }

    button {
      padding: 12px 18px;
      margin: 10px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      background: linear-gradient(135deg, #ff7eb3, #7afcff);
      color: black;
      transition: 0.25s;
    }

    button:hover {
      transform: scale(1.05);
    }

    .user {
      margin: 15px auto;
      padding: 15px;
      border-radius: 16px;
      width: 85%;
      background: rgba(255,255,255,0.06);
    }

    #connections {
      max-height: 300px;
      overflow-y: auto;
    }
  </style>
</head>

<body>

<h2>DuoAlarm Web 🚨</h2>

<!-- WAKE -->
<div id="wake">
  <p>Server may be sleeping 😴</p>
  <button onclick="wakeServer()">Unsleep Server</button>
  <p id="wakeStatus"></p>
</div>

<!-- LOGIN -->
<div id="login" style="display:none;">
  <input id="username" placeholder="Enter username">
  <br>
  <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">
  <h3 id="welcome"></h3>
  <button onclick="logout()">Logout</button>

  <h3>Search User</h3>
  <input id="searchUser">
  <button onclick="ringDirect()">Ring 🔔</button>

  <h3>Your Connections</h3>
  <div id="connections"></div>
</div>

<script>
const BACKEND_URL = "https://duoalarm-backend.onrender.com";

const firebaseConfig = {
    apiKey: "AIzaSyDVmBpu0l5FRhP2N87droigzL5bEV1f7GY",
    authDomain: "duoalarm20078.firebaseapp.com",
    projectId: "duoalarm20078",
    storageBucket: "duoalarm20078.firebasestorage.app",
    messagingSenderId: "609915871258",
    appId: "1:609915871258:web:dd47b54849fd95130831a3",
    measurementId: "G-9592GJCZEH"
  };

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const messaging = firebase.messaging();

// 🔥 WAKE SERVER
async function wakeServer() {
  document.getElementById("wakeStatus").innerText = "Waking server...";
  try {
    await fetch(BACKEND_URL);
    document.getElementById("wake").style.display = "none";
    document.getElementById("login").style.display = "block";
  } catch {
    document.getElementById("wakeStatus").innerText = "Retry...";
  }
}

// LOGIN
function login() {
  const username = document.getElementById("username").value;
  localStorage.setItem("username", username);
  showApp(username);
}

function logout() {
  localStorage.removeItem("username");
  location.reload();
}

function showApp(username) {
  document.getElementById("login").style.display = "none";
  document.getElementById("app").style.display = "block";
  document.getElementById("welcome").innerText = "Hello " + username;

  setupFCM(username);
  loadConnections(username);
}

// 🔥 SETUP FCM
function setupFCM(username) {
  Notification.requestPermission().then(permission => {
    if (permission === "granted") {
      messaging.getToken().then(token => {
        console.log("Token:", token);

        db.collection("users").doc(username).set({
          token: token
        }, { merge: true });
      });
    }
  });
}

// 🔥 RECEIVE MESSAGES
messaging.onMessage((payload) => {
  console.log("Received:", payload);

  if (payload.data?.type === "snoozed") {
    alert(payload.data.sender + " snoozed your alarm 😴");
    return;
  }

  alert("🔔 Alarm from " + payload.data.sender);
});

// CONNECTIONS
async function loadConnections(username) {
  const doc = await db.collection("users").doc(username).get();
  const connections = doc.data()?.connections || [];

  const container = document.getElementById("connections");
  container.innerHTML = "";

  connections.forEach(user => {
    const div = document.createElement("div");
    div.className = "user";

    div.innerHTML = `
      <b>${user}</b><br>
      <button onclick="ring('${user}')">Ring 🔔</button>
    `;

    container.appendChild(div);
  });
}

// 🔥 SEND ALARM
async function ring(targetUser) {
  const sender = localStorage.getItem("username");

  const doc = await db.collection("users").doc(targetUser).get();
  const token = doc.data().token;

  await fetch(BACKEND_URL + "/sendAlarm", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ sender, token })
  });

  alert("Ringing " + targetUser);
}

function ringDirect() {
  const targetUser = document.getElementById("searchUser").value;
  ring(targetUser);
}
</script>

</body>
</html>
